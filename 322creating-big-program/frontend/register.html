<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - campus3ai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>📝 注册 campus3ai</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" class="form-input" id="email" placeholder="请输入邮箱" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" class="form-input" id="password" placeholder="至少 6 位密码" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">注 册</button>
            </form>
            <div class="auth-link">已有账号？<a href="login.html">去登录</a></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (password.length < 6) { alert('密码至少 6 位'); return; }

            const result = await AuthAPI.register({ username, email, password });
            if (result && result.code === 200) {
                alert('注册成功！请登录');
                window.location.href = 'login.html';
            } else {
                alert(result?.message || '注册失败');
            }
        });
    </script>
</body>
</html>
