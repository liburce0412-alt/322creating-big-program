<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习统计 - campus3ai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><span class="icon">🎓</span> campus3ai</div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><span class="nav-icon">📊</span> 首页</a></li>
                <li><a href="pomodoro.html"><span class="nav-icon">🍅</span> 番茄钟</a></li>
                <li><a href="records.html"><span class="nav-icon">📋</span> 时间记录</a></li>
                <li><a href="stats.html" class="active"><span class="nav-icon">📈</span> 统计</a></li>
                <li><a href="ai-report.html"><span class="nav-icon">🤖</span> AI 分析</a></li>
                <li><a href="achievements.html"><span class="nav-icon">🏆</span> 成就</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-user" id="current-user">未登录</div>
                <a href="#" id="btn-logout">退出登录</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>📈 学习统计</h1>
                <p>全面了解你的学习数据与趋势</p>
            </div>

            <!-- 统计概览 -->
            <div class="stats-grid" id="overview-stats">
                <div class="stat-card">
                    <div class="stat-icon">🍅</div>
                    <div class="stat-value" id="stat-total-pomo">-</div>
                    <div class="stat-label">累计番茄钟</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱</div>
                    <div class="stat-value" id="stat-total-hours">-</div>
                    <div class="stat-label">总专注小时</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-value" id="stat-week-pomo">-</div>
                    <div class="stat-label">本周完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="stat-streak">-</div>
                    <div class="stat-label">连续打卡天数</div>
                </div>
            </div>

            <!-- 每日趋势图 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📅 近 7 天番茄钟趋势</span>
                </div>
                <div class="chart-container" style="box-shadow:none;border:none;margin:0;padding:0">
                    <div class="chart-bars" id="daily-chart">
                        <div class="empty-state"><div class="empty-text">加载中...</div></div>
                    </div>
                </div>
            </div>

            <!-- 分类统计 + 时间段分析 两栏 -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <!-- 分类统计 -->
                <div class="card">
                    <div class="card-header"><span class="card-title">📂 学习分类分布</span></div>
                    <div id="category-stats">
                        <div class="empty-state"><div class="empty-text">加载中...</div></div>
                    </div>
                </div>

                <!-- 高效时段 -->
                <div class="card">
                    <div class="card-header"><span class="card-title">⏰ 高效时段分析</span></div>
                    <div id="peak-hours">
                        <div class="empty-state"><div class="empty-text">加载中...</div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadPomodoroStats(),
                loadTimeStats(),
                loadInsights(),
            ]);
        });

        async function loadPomodoroStats() {
            const result = await PomodoroAPI.stats();
            if (!result || result.code !== 200) return;

            const d = result.data;
            document.getElementById('stat-total-pomo').textContent = d.total_completed;
            document.getElementById('stat-total-hours').textContent = d.total_focus_hours + 'h';
            document.getElementById('stat-week-pomo').textContent = d.week_completed;
            document.getElementById('stat-streak').textContent = d.current_streak_days + ' 天';

            // 每日趋势图
            const trend = d.daily_trend || [];
            const maxCount = Math.max(1, ...trend.map(t => t.count));
            let barsHtml = '';
            trend.forEach(t => {
                const height = Math.max(4, (t.count / maxCount) * 140);
                const dayName = ['日','一','二','三','四','五','六'][new Date(t.date).getDay()];
                barsHtml += `
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height:${height}px" title="${t.date}: ${t.count}个"></div>
                        <div class="chart-bar-label">${dayName}</div>
                        <div style="font-size:0.65rem;color:var(--text-secondary)">${t.count}</div>
                    </div>`;
            });
            document.getElementById('daily-chart').innerHTML = barsHtml;
        }

        async function loadTimeStats() {
            const result = await TimeAPI.stats();
            if (!result || result.code !== 200) return;

            const categories = result.data.by_category || [];
            if (categories.length === 0) {
                document.getElementById('category-stats').innerHTML =
                    '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无分类数据</div></div>';
                return;
            }

            const maxMin = Math.max(...categories.map(c => c.total_minutes));
            let html = '';
            categories.forEach(c => {
                const pct = maxMin > 0 ? Math.round(c.total_minutes / maxMin * 100) : 0;
                html += `
                    <div style="margin-bottom:12px">
                        <div class="flex justify-between items-center" style="margin-bottom:4px">
                            <span style="font-weight:500">${c.category}</span>
                            <span class="text-sm text-muted">${c.total_minutes} 分钟 (${c.count} 次)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${pct}%"></div>
                        </div>
                    </div>`;
            });
            document.getElementById('category-stats').innerHTML = html;
        }

        async function loadInsights() {
            const result = await AIAPI.insights();
            if (!result || result.code !== 200) {
                document.getElementById('peak-hours').innerHTML =
                    '<div class="empty-state"><div class="empty-text">暂无数据</div></div>';
                return;
            }

            const d = result.data;
            let html = '';

            // 高效时段
            if (d.best_hours && d.best_hours.length > 0) {
                html += '<div style="margin-bottom:16px"><strong>🔥 高效时段</strong></div>';
                d.best_hours.forEach((h, i) => {
                    html += `<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
                        <span style="font-size:1.2rem">${['🥇','🥈','🥉'][i] || '📌'}</span>
                        <span>${h.hour}</span>
                        <span class="text-sm text-muted">${h.count} 个番茄钟</span>
                    </div>`;
                });
            }

            // 建议
            if (d.tips && d.tips.length > 0) {
                html += '<div style="margin-top:16px"><strong>💡 个性化建议</strong></div>';
                d.tips.forEach(tip => {
                    html += `<div style="margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:0.85rem">${tip}</div>`;
                });
            }

            document.getElementById('peak-hours').innerHTML = html ||
                '<div class="empty-state"><div class="empty-text">完成更多番茄钟后获得分析</div></div>';
        }
    </script>
</body>
</html>
