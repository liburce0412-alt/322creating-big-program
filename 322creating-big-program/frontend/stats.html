<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<body>
<nav id="navbar">
    <a href="/" class="navbar-brand">
        <span class="logo-icon">🎓</span> 校园达人
    </a>
    <ul class="navbar-nav">
        <li><a href="/dashboard.html" class="nav-link">🏠 首页</a></li>
        <li><a href="/pomodoro.html" class="nav-link">🍅 番茄钟</a></li>
        <li><a href="/records.html" class="nav-link">📝 时间记录</a></li>
        <li><a href="/stats.html" class="nav-link active">📊 统计</a></li>
        <li><a href="/ai-report.html" class="nav-link">🤖 AI 分析</a></li>
        <li><a href="/achievements.html" class="nav-link">🏆 成就</a></li>
    </ul>
    <div class="navbar-user">
        <span class="username" id="nav-username">用户</span>
        <span class="level-badge" id="nav-level">Lv.1</span>
        <button class="btn-logout" id="btn-logout-nav">退出</button>
    </div>
</nav>

<div class="page-container">
    <div class="page-header">
        <h1>📊 统计分析</h1>
        <p>查看你的时间使用情况</p>
    </div>

    <div class="stats-grid" id="stats-grid">
        <div class="card" style="text-align:center; padding:20px;">
            <div class="big-number" id="s1">--</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:4px;">总学习时长（分钟）</div>
        </div>
        <div class="card" style="text-align:center; padding:20px;">
            <div class="big-number" id="s2">--</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:4px;">总记录数</div>
        </div>
        <div class="card" style="text-align:center; padding:20px;">
            <div class="big-number" id="s3">--</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:4px;">番茄钟完成次数</div>
        </div>
        <div class="card" style="text-align:center; padding:20px;">
            <div class="big-number" id="s4">--</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:4px;">当前等级</div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
            <div class="card-header">📂 时间分配（按类别）</div>
            <div style="max-width:380px; margin:0 auto;"><canvas id="pie-chart" width="300" height="300" style="display:block;margin:0 auto;"></canvas></div>
            <div id="pie-empty" style="display:none;text-align:center;padding:40px;color:var(--text-light);">暂无数据，添加时间记录后查看</div>
            <div class="category-list" id="category-list" style="margin-top:12px;"></div>
        </div>
        <div class="card">
            <div class="card-header">📅 近30天记录</div>
            <div id="daily-list" style="max-height:400px;overflow-y:auto;"><p class="text-muted">加载中...</p></div>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <div class="card-header">🍅 本周番茄钟</div>
        <canvas id="bar-chart" width="600" height="200" style="display:block;margin:0 auto;"></canvas>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/utils.js?v=2"></script>
<script>
async function initStats() {
    if (!auth.requireLogin()) return;
    await auth.renderNavbar();
    try {
        var [ts, ps, pf] = await Promise.all([api.getTimeStats(), api.getPomodoroStats(), api.getProfile()]);
        renderStats(ts, ps, pf);
    } catch (e) { console.error(e); utils.toast("加载失败","error"); }
}

function renderStats(ts, ps, pf) {
    document.getElementById("s1").textContent = ts.total_minutes || 0;
    document.getElementById("s2").textContent = ts.total_records || 0;
    document.getElementById("s3").textContent = ps.total_sessions || 0;
    document.getElementById("s4").textContent = "Lv." + (pf.level || 1);

    var cats = ts.by_category || [];
    var list = document.getElementById("category-list");
    var total = cats.reduce(function(s,c){return s+c.total_min;}, 0);
    var colors = ["#4A90D9","#5CB85C","#F5A623","#7B68EE","#D9534F","#5BC0DE","#F0AD4E","#999"];

    if (!cats.length) {
        list.innerHTML = '<p class="text-muted" style="text-align:center;">暂无数据</p>';
        document.getElementById("pie-empty").style.display = "block";
        document.getElementById("pie-chart").style.display = "none";
    } else {
        document.getElementById("pie-empty").style.display = "none";
        document.getElementById("pie-chart").style.display = "block";
        var h = "";
        for (var i=0; i<cats.length; i++) {
            var pct = total>0?(cats[i].total_min/total*100).toFixed(1):0;
            h += '<div class="cat-item"><div style="flex:1;"><span style="font-weight:600;">'+cats[i].category+'</span>' +
                '<div class="cat-bar"><div class="cat-bar-fill" style="width:'+pct+'%;background:'+colors[i%colors.length]+';"></div></div></div>' +
                '<div style="text-align:right;margin-left:12px;"><div><strong>'+cats[i].total_min+'</strong> 分钟</div>' +
                '<div style="font-size:0.8rem;color:var(--text-light);">'+cats[i].count+' 次</div></div></div>';
        }
        list.innerHTML = h;
        utils.drawPieChart("pie-chart", cats.map(function(c,i){return{label:c.category, value:c.total_min, color:colors[i%colors.length]};}));
    }

    var days = ts.by_date || [];
    var dl = document.getElementById("daily-list");
    dl.innerHTML = days.length ? days.map(function(d){return '<div class="daily-item"><span style="color:var(--text-secondary);">'+d.date+'</span><span><strong>'+d.total_min+'</strong> 分钟</span></div>';}).join("") 
        : '<p class="text-muted" style="text-align:center;">暂无每日数据</p>';

    var wk = ps.weekly_sessions || [];
    utils.drawBarChart("bar-chart", wk.map(function(w){return{label:w.date.slice(5), value:w.count};}));
}

document.addEventListener("DOMContentLoaded", initStats);
</script>
<script>
(function() {
    var u = localStorage.getItem("campus_user");
    if (u) {
        try {
            var p = JSON.parse(u);
            document.getElementById("nav-username").textContent = p.username || "用户";
            document.getElementById("nav-level").textContent = "Lv." + (p.level || 1);
        } catch(e) {}
    }
})();
</script>

</body>
</html>
