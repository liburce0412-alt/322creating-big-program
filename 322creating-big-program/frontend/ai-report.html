<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 分析 - campus3ai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><span class="icon">🎓</span> campus3ai</div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><span class="nav-icon">📊</span> 首页</a></li>
                <li><a href="pomodoro.html"><span class="nav-icon">🍅</span> 番茄钟</a></li>
                <li><a href="records.html"><span class="nav-icon">📋</span> 时间记录</a></li>
                <li><a href="stats.html"><span class="nav-icon">📈</span> 统计</a></li>
                <li><a href="ai-report.html" class="active"><span class="nav-icon">🤖</span> AI 分析</a></li>
                <li><a href="achievements.html"><span class="nav-icon">🏆</span> 成就</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-user" id="current-user">未登录</div>
                <a href="#" id="btn-logout">退出登录</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>🤖 AI 学习分析</h1>
                <p>智能分析你的学习数据，提供个性化建议</p>
            </div>

            <!-- Tab 切换 -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('report')">📊 学习报告</button>
                <button class="tab-btn" onclick="switchTab('chat')">💬 AI 助手</button>
                <button class="tab-btn" onclick="switchTab('insights')">💡 学习洞察</button>
            </div>

            <!-- ===== 学习报告 Tab ===== -->
            <div id="tab-report">
                <!-- 报告生成 -->
                <div class="card">
                    <div class="card-header"><span class="card-title">📝 生成学习报告</span></div>
                    <div class="flex gap-4" style="flex-wrap:wrap">
                        <select class="form-input" id="report-type" style="width:auto">
                            <option value="daily">📅 日报</option>
                            <option value="weekly">📊 周报</option>
                            <option value="monthly">📈 月报</option>
                        </select>
                        <button class="btn btn-primary" onclick="generateReport()">
                            🤖 生成 AI 报告
                        </button>
                    </div>
                </div>

                <!-- 最新报告展示 -->
                <div id="latest-report"></div>

                <!-- 历史报告列表 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">📚 历史报告</span>
                        <span class="text-sm text-muted" id="report-total"></span>
                    </div>
                    <div id="report-list">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">还没有报告，生成你的第一份 AI 分析吧</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== AI 助手 Tab ===== -->
            <div id="tab-chat" class="hidden">
                <div class="chat-container">
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">💬 学习助手</span>
                            <button class="btn btn-sm btn-outline" onclick="clearChat()">清空对话</button>
                        </div>
                        <div class="chat-messages" id="chat-messages">
                            <div class="chat-msg assistant">
                                <div class="chat-bubble">
                                    你好！👋 我是你的 AI 学习助手。<br>
                                    我可以帮你：<br>
                                    • 分析学习数据<br>
                                    • 提供学习建议<br>
                                    • 解答学习相关问题<br>
                                    有什么可以帮你的吗？
                                </div>
                            </div>
                        </div>
                        <div class="chat-input-row">
                            <input type="text" class="form-input" id="chat-input"
                                   placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMessage()">
                            <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== 学习洞察 Tab ===== -->
            <div id="tab-insights" class="hidden">
                <div class="stats-grid" id="insight-stats"></div>
                <div class="card">
                    <div class="card-header"><span class="card-title">🔥 高效时段</span></div>
                    <div id="insight-hours"></div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">💡 智能建议</span></div>
                    <div id="insight-tips"></div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">📅 本周趋势</span></div>
                    <div class="chart-container" style="box-shadow:none;border:none;margin:0;padding:0">
                        <div class="chart-bars" id="insight-trend"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentTab = 'report';

        document.addEventListener('DOMContentLoaded', () => {
            loadReportList();
        });

        // ===== Tab 切换 =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-report').classList.add('hidden');
            document.getElementById('tab-chat').classList.add('hidden');
            document.getElementById('tab-insights').classList.add('hidden');
            document.getElementById(`tab-${tab}`).classList.remove('hidden');

            if (tab === 'report') loadReportList();
            if (tab === 'chat') loadChatHistory();
            if (tab === 'insights') loadInsights();
        }

        // ===== 报告生成 =====
        async function generateReport() {
            const type = document.getElementById('report-type').value;
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '生成中...';

            const result = await AIAPI.generateReport({ type });
            btn.disabled = false;
            btn.textContent = '🤖 生成 AI 报告';

            if (result && result.code === 200) {
                showReport(result.data);
                loadReportList();

                // 检查新成就
                setTimeout(async () => {
                    const check = await AchievementAPI.check();
                    if (check && check.code === 200 && check.data.newly_unlocked.length > 0) {
                        check.data.newly_unlocked.forEach(a => {
                            showToast(`🏆 解锁成就：${a.name}`, 'success', 5000);
                        });
                    }
                }, 500);
            } else {
                showToast(result?.message || '生成失败', 'error');
            }
        }

        function showReport(data) {
            const scoreClass = data.score >= 80 ? 'score-high' : (data.score >= 50 ? 'score-mid' : 'score-low');
            document.getElementById('latest-report').innerHTML = `
                <div class="card" style="border:2px solid var(--primary)">
                    <div class="flex justify-between items-center" style="margin-bottom:16px">
                        <div>
                            <strong style="font-size:1.2rem">${data.type === 'daily' ? '日报' : data.type === 'weekly' ? '周报' : '月报'}</strong>
                            <span class="text-sm text-muted" style="margin-left:12px">${data.period_start} ~ ${data.period_end}</span>
                        </div>
                        <div class="report-score ${scoreClass}">${data.score}</div>
                    </div>
                    <div class="stats-grid" style="margin-bottom:16px">
                        <div class="stat-card"><div class="stat-value" style="font-size:1.2rem">${data.stats.completed_pomodoros}</div><div class="stat-label">番茄钟</div></div>
                        <div class="stat-card"><div class="stat-value" style="font-size:1.2rem">${data.stats.total_focus_hours}h</div><div class="stat-label">专注时长</div></div>
                    </div>
                    <div class="report-content" style="background:var(--bg);padding:16px;border-radius:8px">${data.content}</div>
                    ${data.suggestions.length ? `
                        <div style="margin-top:16px">
                            <strong>💡 改进建议：</strong>
                            <ul style="margin-top:8px;padding-left:20px">
                                ${data.suggestions.map(s => `<li style="margin-bottom:4px">${s}</li>`).join('')}
                            </ul>
                        </div>` : ''}
                </div>`;
        }

        async function loadReportList() {
            const result = await AIAPI.listReports({ per_page: 10 });
            if (!result || result.code !== 200) return;

            document.getElementById('report-total').textContent = `共 ${result.data.total} 份`;

            if (result.data.list.length === 0) return;

            let html = '';
            result.data.list.forEach(r => {
                const typeLabel = {'daily':'日报','weekly':'周报','monthly':'月报'}[r.report_type] || r.report_type;
                html += `
                    <div class="card" style="cursor:pointer" onclick="viewReport(${r.id})">
                        <div class="flex justify-between items-center">
                            <div>
                                <strong>${typeLabel}</strong>
                                <span class="text-sm text-muted" style="margin-left:8px">评分: ${r.score}/100</span>
                            </div>
                            <div class="flex gap-2 items-center">
                                <span class="text-sm text-muted">${formatDate(r.created_at)}</span>
                                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteReport(${r.id})">删除</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('report-list').innerHTML = html;
        }

        async function viewReport(id) {
            const result = await AIAPI.getReport(id);
            if (result && result.code === 200) {
                const r = result.data;
                showReport({
                    ...r,
                    type: r.report_type,
                    stats: { completed_pomodoros: 0, total_focus_hours: 0 },
                    suggestions: (r.suggestions || '').split(';').filter(Boolean),
                });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function deleteReport(id) {
            if (!confirm('确定删除这份报告？')) return;
            await AIAPI.deleteReport(id);
            loadReportList();
            showToast('报告已删除', 'info');
        }

        // ===== AI 对话 =====
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            // 显示用户消息
            appendMessage('user', message);
            input.value = '';

            const result = await AIAPI.sendMessage({ message });
            if (result && result.code === 200) {
                appendMessage('assistant', result.data.content);
            } else {
                appendMessage('assistant', '抱歉，我暂时无法回复。请稍后再试。');
            }

            // 滚动到底部
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        function appendMessage(role, content) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `chat-msg ${role}`;
            div.innerHTML = `<div class="chat-bubble">${content}</div>`;
            container.appendChild(div);
        }

        async function loadChatHistory() {
            const result = await AIAPI.chatHistory({ per_page: 50 });
            if (!result || result.code !== 200) return;

            const container = document.getElementById('chat-messages');
            if (result.data.list.length > 0) {
                container.innerHTML = '';
                result.data.list.forEach(m => {
                    appendMessage(m.role, m.content);
                });
            }
        }

        async function clearChat() {
            if (!confirm('确定清空所有对话？')) return;
            await AIAPI.clearChat();
            document.getElementById('chat-messages').innerHTML = `
                <div class="chat-msg assistant">
                    <div class="chat-bubble">对话已清空。有什么可以帮你的吗？😊</div>
                </div>`;
            showToast('对话已清空', 'info');
        }

        // ===== 学习洞察 =====
        async function loadInsights() {
            const result = await AIAPI.insights();
            if (!result || result.code !== 200) return;

            const d = result.data;

            // 统计卡片
            document.getElementById('insight-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">🍅</div>
                    <div class="stat-value">${d.today.pomodoros}</div>
                    <div class="stat-label">今日番茄钟</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱</div>
                    <div class="stat-value">${d.today.total_hours}h</div>
                    <div class="stat-label">今日学习时长</div>
                </div>`;

            // 高效时段
            let hoursHtml = '<div class="empty-state"><div class="empty-text">暂无数据</div></div>';
            if (d.best_hours && d.best_hours.length > 0) {
                hoursHtml = d.best_hours.map((h, i) => `
                    <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
                        <span style="font-size:1.2rem">${['🥇','🥈','🥉'][i] || '📌'}</span>
                        <span>${h.hour}</span>
                        <span class="text-sm text-muted">${h.count} 个番茄钟</span>
                    </div>`).join('');
            }
            document.getElementById('insight-hours').innerHTML = hoursHtml;

            // 建议
            let tipsHtml = '<div class="empty-state"><div class="empty-text">暂无建议</div></div>';
            if (d.tips && d.tips.length > 0) {
                tipsHtml = d.tips.map(t => `
                    <div style="padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;font-size:0.9rem">💡 ${t}</div>`).join('');
            }
            document.getElementById('insight-tips').innerHTML = tipsHtml;

            // 趋势图
            if (d.week_trend && d.week_trend.length > 0) {
                const maxCnt = Math.max(1, ...d.week_trend.map(t => t.count));
                document.getElementById('insight-trend').innerHTML = d.week_trend.map(t => {
                    const h = Math.max(4, (t.count / maxCnt) * 140);
                    return `<div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height:${h}px" title="${t.day_name}: ${t.count}个"></div>
                        <div class="chart-bar-label">${t.day_name}</div>
                        <div style="font-size:0.65rem;color:var(--text-secondary)">${t.count}</div>
                    </div>`;
                }).join('');
            }
        }
    </script>
</body>
</html>
