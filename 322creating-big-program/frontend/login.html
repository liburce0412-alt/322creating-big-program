<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="logo">🎓</div>
        <h1>校园达人 CampusAI</h1>
        <p class="subtitle">记录时间，看见成长</p>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" class="form-input" id="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>
            <div class="error-msg" id="error-msg"></div>
            <button type="submit" class="btn btn-primary btn-lg" id="btn-submit">
                登 录
            </button>
        </form>

        <p class="auth-switch">
            还没有账号？<a href="register.html">立即注册 →</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
// 如果已登录，直接跳转仪表盘
if (auth.isLoggedIn()) {
    window.location.href = 'dashboard.html';
}

async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-submit');

    if (!username || !password) {
        showError('请输入用户名和密码');
        return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';
    hideError();

    try {
        await auth.login(username, password);
        utils.toast('登录成功！欢迎回来 🎉', 'success');
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 500);
    } catch (err) {
        showError(err.message || '登录失败，请检查用户名和密码');
        btn.disabled = false;
        btn.textContent = '登 录';
    }
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideError() {
    document.getElementById('error-msg').style.display = 'none';
}
</script>

</body>
</html>
