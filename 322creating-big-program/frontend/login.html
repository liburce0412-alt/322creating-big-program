<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - campus3ai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>🔐 登录 campus3ai</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>用户名 / 邮箱</label>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">登 录</button>
            </form>
            <div class="auth-link">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
            <div class="auth-link">
                <a href="dashboard.html">跳过登录（体验模式）</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }

            const result = await AuthAPI.login({ username, password });
            if (result && result.code === 200) {
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));
                window.location.href = 'dashboard.html';
            } else {
                alert(result?.message || '登录失败');
            }
        });
    </script>
</body>
</html>
