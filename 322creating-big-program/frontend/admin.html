<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 校园达人</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar"></nav>
    <div class="page-container">
        <div class="page-header">
            <h1>管理后台</h1>
            <p>用户与数据管理</p>
        </div>
        <div class="card-grid" id="stats-cards">
            <div class="card stat-card"><div class="stat-icon">Users</div><div class="stat-value" id="stat-users">-</div><div class="stat-label">总用户数</div></div>
            <div class="card stat-card"><div class="stat-icon">Admin</div><div class="stat-value" id="stat-admins">-</div><div class="stat-label">管理员</div></div>
            <div class="card stat-card"><div class="stat-icon">Data</div><div class="stat-value" id="stat-records">-</div><div class="stat-label">总记录数</div></div>
        </div>
        <div class="card">
            <div class="card-header">用户列表</div>
            <div class="table-wrapper" style="overflow-x:auto;">
                <table style="width:100%;border-collapse:collapse;">
                    <thead><tr>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;">ID</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;">用户名</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;">等级</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;">经验</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;">记录数</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;">注册时间</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;">管理员</th>
                        <th style="padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;">操作</th>
                    </tr></thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/utils.js?v=3"></script>
    <script>
async function init() {
    if (!auth.requireLogin()) return;
    await auth.renderNavbar();
    await loadAdminData();
}
async function loadAdminData() {
    try {
        var d = await api.getAdminUsers();
        document.getElementById("stat-users").textContent = d.stats.total_users;
        document.getElementById("stat-admins").textContent = d.stats.total_admins;
        document.getElementById("stat-records").textContent = d.stats.total_records;
        var html = "";
        for (var i = 0; i < d.users.length; i++) {
            var u = d.users[i];
            var t = u.created_at || "";
            if (t && t.indexOf("T") === -1) {
                var dt = new Date(t.replace(" ", "T") + "Z");
                t = dt.toLocaleString("zh-CN", {timeZone:"Asia/Shanghai"});
            }
            var isAdmin = u.is_admin ? "是" : "否";
            var adminColor = u.is_admin ? "var(--success)" : "var(--text-light)";
            html += "<tr><td style='padding:10px 12px;border-bottom:1px solid var(--border);'>" + u.id + "</td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);'><strong>" + u.username + "</strong></td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);'>" + u.level + "</td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);'>" + u.exp + "</td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);'>" + (u.record_count || 0) + "</td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.85rem;'>" + t + "</td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;color:" + adminColor + ";font-weight:600;'>" + isAdmin + "</td>" +
                "<td style='padding:10px 12px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;'>" +
                    (u.is_admin ? "<button class='btn btn-sm btn-outline' onclick='doAct(" + u.id + ",\"" + u.username + "\",\"demote\")'>取消管理</button> " : "<button class='btn btn-sm btn-primary' onclick='doAct(" + u.id + ",\"" + u.username + "\",\"promote\")'>设为管理</button> ") +
                    "<button class='btn btn-sm btn-danger' onclick='doAct(" + u.id + ",\"" + u.username + "\",\"delete\")'>删除</button>" +
                "</td></tr>";
        }
        document.getElementById("users-tbody").innerHTML = html;
    } catch(e) {
        document.getElementById("users-tbody").innerHTML = "<tr><td colspan='8' style='text-align:center;padding:24px;color:var(--danger);'>加载失败: " + e.message + "</td></tr>";
    }
}
async function doAct(id, name, action) {
    if (action === "delete" && !confirm("确定删除用户 " + name + " 的所有数据?")) return;
    try {
        if (action === "promote") await api.promoteAdmin(id);
        else if (action === "demote") await api.demoteAdmin(id);
        else await api.deleteUser(id);
        utils.toast("操作成功", "success");
        loadAdminData();
    } catch(e) { utils.toast(e.message || "操作失败", "error"); }
}
document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
