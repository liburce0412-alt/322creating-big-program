<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - campus3ai</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo"><span class="icon">🎓</span> campus3ai</div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><span class="nav-icon">📊</span> 首页</a></li>
                <li><a href="pomodoro.html" class="active"><span class="nav-icon">🍅</span> 番茄钟</a></li>
                <li><a href="records.html"><span class="nav-icon">📋</span> 时间记录</a></li>
                <li><a href="stats.html"><span class="nav-icon">📈</span> 统计</a></li>
                <li><a href="ai-report.html"><span class="nav-icon">🤖</span> AI 分析</a></li>
                <li><a href="achievements.html"><span class="nav-icon">🏆</span> 成就</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="sidebar-user" id="current-user">未登录</div>
                <a href="#" id="btn-logout">退出登录</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>🍅 番茄钟</h1>
                <p>25 分钟专注 + 5 分钟休息，高效学习从这里开始</p>
            </div>

            <!-- 番茄钟计时器 -->
            <div class="card pomodoro-container">
                <!-- 任务名称输入 -->
                <div class="timer-task-name">
                    <input type="text" class="form-input" id="task-name"
                           placeholder="输入当前任务名称（可选）" maxlength="50">
                </div>

                <!-- 计时器圆圈 -->
                <div class="timer-circle" id="timer-circle">
                    <div class="timer-display" id="timer-display">25:00</div>
                    <div class="timer-status" id="timer-status">准备开始</div>
                </div>

                <!-- 控制按钮 -->
                <div class="timer-controls">
                    <button class="btn btn-success btn-lg" id="btn-start" onclick="startPomodoro()">
                        ▶ 开始专注
                    </button>
                    <button class="btn btn-warning btn-lg hidden" id="btn-pause" onclick="pausePomodoro()">
                        ⏸ 暂停
                    </button>
                    <button class="btn btn-primary btn-lg hidden" id="btn-resume" onclick="resumePomodoro()">
                        ▶ 继续
                    </button>
                    <button class="btn btn-success btn-lg hidden" id="btn-complete" onclick="completePomodoro()">
                        ✓ 完成
                    </button>
                    <button class="btn btn-outline btn-lg hidden" id="btn-abandon" onclick="abandonPomodoro()">
                        ✗ 放弃
                    </button>
                </div>

                <!-- 模式选择 -->
                <div class="flex items-center justify-between gap-2" style="margin-top:16px">
                    <button class="btn btn-sm btn-outline" onclick="setMode(25)">🍅 25 分钟</button>
                    <button class="btn btn-sm btn-outline" onclick="setMode(45)">⏰ 45 分钟</button>
                    <button class="btn btn-sm btn-outline" onclick="setMode(15)">☕ 15 分钟</button>
                    <button class="btn btn-sm btn-outline" onclick="setMode(5)">⏸ 5 分钟休息</button>
                </div>
            </div>

            <!-- 今日统计 + 历史 -->
            <div class="stats-grid" id="today-stats">
                <div class="stat-card">
                    <div class="stat-icon">🍅</div>
                    <div class="stat-value" id="stat-today">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱</div>
                    <div class="stat-value" id="stat-focus-today">0m</div>
                    <div class="stat-label">今日专注</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="stat-streak">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">累计完成</div>
                </div>
            </div>

            <!-- 番茄钟历史 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📋 历史记录</span>
                    <span class="text-sm text-muted" id="total-count">共 0 条</span>
                </div>
                <div id="history-list">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">还没有番茄钟记录，开始第一个吧！</div>
                    </div>
                </div>
                <div class="flex justify-between items-center mt-4" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // ========== 状态变量 ==========
        let currentSession = null;      // 当前番茄钟会话
        let timerInterval = null;       // 计时器 interval ID
        let remainingSeconds = 0;       // 剩余秒数
        let totalSeconds = 25 * 60;     // 总秒数（默认 25 分钟）
        let currentMode = 'work';       // work / break
        let workMinutes = 25;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            await checkCurrentSession();
            await loadStats();
            await loadHistory(1);
        });

        async function checkCurrentSession() {
            const result = await PomodoroAPI.current();
            if (result && result.code === 200 && result.data) {
                currentSession = result.data;
                const status = currentSession.status;
                workMinutes = currentSession.work_duration;
                totalSeconds = workMinutes * 60;

                if (status === 'running') {
                    // 恢复运行状态
                    startTimer();
                    updateUI('running');
                    document.getElementById('task-name').value = currentSession.task_name || '';
                    document.getElementById('timer-status').textContent = '专注中...';
                    document.getElementById('timer-circle').className = 'timer-circle running';
                } else if (status === 'paused') {
                    remainingSeconds = Math.max(0, totalSeconds - Math.floor((currentSession.total_focus_seconds || 0)));
                    updateTimerDisplay();
                    updateUI('paused');
                    document.getElementById('task-name').value = currentSession.task_name || '';
                    document.getElementById('timer-status').textContent = '已暂停';
                    document.getElementById('timer-circle').className = 'timer-circle paused';
                }
            }
        }

        // ========== 计时器逻辑 ==========
        function startTimer() {
            stopTimer();
            if (remainingSeconds <= 0) {
                remainingSeconds = totalSeconds;
            }
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                remainingSeconds--;
                updateTimerDisplay();
                if (remainingSeconds <= 0) {
                    stopTimer();
                    timerFinished();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = formatTime(remainingSeconds);
        }

        function timerFinished() {
            document.getElementById('timer-status').textContent = '时间到！';
            document.getElementById('timer-circle').className = 'timer-circle';
            // 播放提示音（使用 Web Audio API 简单蜂鸣）
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}

            updateUI('completed');
            showToast('🍅 番茄钟时间到！干得漂亮！', 'success', 5000);
        }

        // ========== 番茄钟操作 ==========
        async function startPomodoro() {
            const taskName = document.getElementById('task-name').value.trim() || '未命名任务';
            const result = await PomodoroAPI.start({
                task_name: taskName,
                work_duration: workMinutes,
                break_duration: 5,
            });

            if (result && result.code === 200) {
                currentSession = result.data;
                remainingSeconds = workMinutes * 60;
                totalSeconds = workMinutes * 60;
                currentMode = 'work';
                document.getElementById('timer-circle').className = 'timer-circle running';
                document.getElementById('timer-status').textContent = '专注中...';
                startTimer();
                updateUI('running');
                showToast('番茄钟已开始！保持专注 💪', 'success');
            } else {
                showToast(result?.message || '启动失败', 'error');
            }
        }

        async function pausePomodoro() {
            if (!currentSession) return;
            const result = await PomodoroAPI.pause(currentSession.id);
            if (result && result.code === 200) {
                stopTimer();
                updateUI('paused');
                document.getElementById('timer-circle').className = 'timer-circle paused';
                document.getElementById('timer-status').textContent = '已暂停';
                showToast('番茄钟已暂停', 'info');
            } else {
                showToast(result?.message || '暂停失败', 'error');
            }
        }

        async function resumePomodoro() {
            if (!currentSession) return;
            const result = await PomodoroAPI.resume(currentSession.id);
            if (result && result.code === 200) {
                startTimer();
                updateUI('running');
                document.getElementById('timer-circle').className = 'timer-circle running';
                document.getElementById('timer-status').textContent = '专注中...';
                showToast('番茄钟已恢复', 'success');
            } else {
                showToast(result?.message || '恢复失败', 'error');
            }
        }

        async function completePomodoro() {
            if (!currentSession) return;
            const result = await PomodoroAPI.complete(currentSession.id);
            if (result && result.code === 200) {
                stopTimer();
                currentSession = null;
                document.getElementById('timer-circle').className = 'timer-circle';
                document.getElementById('timer-status').textContent = '完成！休息一下吧 🎉';
                document.getElementById('timer-display').textContent = formatTime(workMinutes * 60);
                updateUI('idle');
                showToast('番茄钟完成！🎉', 'success');
                loadStats();
                loadHistory(1);

                // 检查新成就
                setTimeout(async () => {
                    const check = await AchievementAPI.check();
                    if (check && check.code === 200 && check.data.newly_unlocked.length > 0) {
                        check.data.newly_unlocked.forEach(a => {
                            showToast(`🏆 解锁成就：${a.name}`, 'success', 5000);
                        });
                    }
                }, 500);
            } else {
                showToast(result?.message || '操作失败', 'error');
            }
        }

        async function abandonPomodoro() {
            if (!currentSession) return;
            if (!confirm('确定要放弃当前番茄钟吗？')) return;

            const result = await PomodoroAPI.abandon(currentSession.id);
            if (result && result.code === 200) {
                stopTimer();
                currentSession = null;
                document.getElementById('timer-circle').className = 'timer-circle';
                document.getElementById('timer-status').textContent = '准备开始';
                document.getElementById('timer-display').textContent = formatTime(workMinutes * 60);
                updateUI('idle');
                showToast('番茄钟已放弃', 'warning');
                loadHistory(1);
            } else {
                showToast(result?.message || '操作失败', 'error');
            }
        }

        // ========== 模式切换 ==========
        function setMode(minutes) {
            if (currentSession && currentSession.status === 'running') {
                if (!confirm('切换模式将放弃当前番茄钟，确定吗？')) return;
                abandonPomodoro();
            }
            stopTimer();
            workMinutes = minutes;
            totalSeconds = minutes * 60;
            remainingSeconds = totalSeconds;
            document.getElementById('timer-display').textContent = formatTime(totalSeconds);
            currentMode = minutes <= 5 ? 'break' : 'work';
            document.getElementById('timer-status').textContent = minutes <= 5 ? '休息模式' : '准备开始';
            document.getElementById('timer-circle').className = 'timer-circle';
            updateUI('idle');
            currentSession = null;
            showToast(`已切换到 ${minutes} 分钟模式`, 'info');
        }

        // ========== UI 更新 ==========
        function updateUI(state) {
            const btnStart = document.getElementById('btn-start');
            const btnPause = document.getElementById('btn-pause');
            const btnResume = document.getElementById('btn-resume');
            const btnComplete = document.getElementById('btn-complete');
            const btnAbandon = document.getElementById('btn-abandon');

            btnStart.classList.add('hidden');
            btnPause.classList.add('hidden');
            btnResume.classList.add('hidden');
            btnComplete.classList.add('hidden');
            btnAbandon.classList.add('hidden');

            switch(state) {
                case 'idle':
                    btnStart.classList.remove('hidden');
                    break;
                case 'running':
                    btnPause.classList.remove('hidden');
                    btnComplete.classList.remove('hidden');
                    btnAbandon.classList.remove('hidden');
                    break;
                case 'paused':
                    btnResume.classList.remove('hidden');
                    btnComplete.classList.remove('hidden');
                    btnAbandon.classList.remove('hidden');
                    break;
                case 'completed':
                    btnStart.classList.remove('hidden');
                    break;
            }
        }

        // ========== 统计数据 ==========
        async function loadStats() {
            const result = await PomodoroAPI.stats();
            if (result && result.code === 200) {
                document.getElementById('stat-today').textContent = result.data.today_completed;
                document.getElementById('stat-focus-today').textContent = Math.round(result.data.total_focus_seconds / 60) + 'm';
                document.getElementById('stat-streak').textContent = result.data.current_streak_days;
                document.getElementById('stat-total').textContent = result.data.total_completed;
            }
        }

        // ========== 历史记录 ==========
        async function loadHistory(page = 1) {
            const result = await PomodoroAPI.list({ page, per_page: 10 });
            if (result && result.code === 200) {
                const data = result.data;
                document.getElementById('total-count').textContent = `共 ${data.total} 条`;

                if (data.list.length === 0) {
                    document.getElementById('history-list').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">还没有番茄钟记录</div>
                        </div>`;
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                let html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.9rem">';
                html += '<thead><tr style="border-bottom:2px solid var(--border);text-align:left">';
                html += '<th style="padding:10px">任务</th><th>时长</th><th>状态</th><th>时间</th></tr></thead><tbody>';

                data.list.forEach(s => {
                    html += `<tr style="border-bottom:1px solid var(--border)">
                        <td style="padding:10px">${s.task_name || '-'}</td>
                        <td>${s.work_duration} 分钟</td>
                        <td>${getStatusBadge(s.status)}</td>
                        <td style="color:var(--text-secondary)">${formatDate(s.created_at)}</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                document.getElementById('history-list').innerHTML = html;

                // 分页
                let pagHtml = '';
                if (data.page > 1) {
                    pagHtml += `<button class="btn btn-sm btn-outline" onclick="loadHistory(${data.page - 1})">上一页</button>`;
                }
                pagHtml += `<span class="text-sm text-muted">${data.page} / ${data.total_pages}</span>`;
                if (data.page < data.total_pages) {
                    pagHtml += `<button class="btn btn-sm btn-outline" onclick="loadHistory(${data.page + 1})">下一页</button>`;
                }
                document.getElementById('pagination').innerHTML = pagHtml;
            }
        }
    </script>
</body>
</html>
