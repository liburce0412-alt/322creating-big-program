<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pomodoro-page {
            max-width: 600px;
            margin: 0 auto;
        }

        .duration-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .duration-btn {
            padding: 10px 24px;
            border: 2px solid var(--border);
            border-radius: 24px;
            background: var(--bg-card);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font);
            transition: all var(--transition);
        }

        .duration-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .duration-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .timer-circle {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-circle canvas {
            position: absolute;
            top: 0; left: 0;
        }

        .timer-text {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .timer-minutes {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .timer-seconds {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .timer-status {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .session-counter {
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .reward-modal .reward-icon {
            font-size: 4rem;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        .new-badge {
            display: inline-block;
            padding: 8px 16px;
            margin: 4px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 20px;
            font-weight: 600;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<nav id="navbar"></nav>

<div class="page-container pomodoro-page">
    <div class="page-header text-center">
        <h1>🍅 番茄钟</h1>
        <p>选择时长，开始专注</p>
    </div>

    <!-- 时长选择 -->
    <div class="duration-selector">
        <button class="duration-btn active" data-min="25" onclick="setDuration(25, this)">
            🍅 25 分钟<br><small>标准专注</small>
        </button>
        <button class="duration-btn" data-min="50" onclick="setDuration(50, this)">
            ⏰ 50 分钟<br><small>深度专注</small>
        </button>
        <button class="duration-btn" data-min="90" onclick="setDuration(90, this)">
            🔥 90 分钟<br><small>极限冲刺</small>
        </button>
    </div>

    <!-- 计时器 -->
    <div class="card">
        <div class="timer-circle">
            <canvas id="timer-canvas" width="280" height="280"></canvas>
            <div class="timer-text">
                <div class="timer-minutes" id="timer-minutes">25</div>
                <div class="timer-seconds" id="timer-seconds">:00</div>
                <div class="timer-status" id="timer-status">准备开始</div>
            </div>
        </div>

        <div class="timer-controls">
            <button class="btn btn-primary btn-lg" id="btn-start" onclick="startTimer()">
                ▶ 开始专注
            </button>
            <button class="btn btn-outline btn-lg hidden" id="btn-pause" onclick="pauseTimer()">
                ⏸ 暂停
            </button>
            <button class="btn btn-danger btn-lg hidden" id="btn-reset" onclick="resetTimer()">
                ↺ 重置
            </button>
        </div>

        <div class="session-counter">
            🍅 今日已完成：<strong id="today-count">0</strong> 个番茄钟 |
            🔥 连续打卡：<strong id="streak-days">0</strong> 天
        </div>
    </div>

    <!-- 历史记录 -->
    <div class="card" style="margin-top: 20px;">
        <div class="card-header">📋 最近番茄钟记录</div>
        <div id="recent-sessions">
            <p class="text-muted">加载中...</p>
        </div>
    </div>
</div>

<!-- 完成弹窗 -->
<div class="modal-overlay hidden" id="reward-modal">
    <div class="modal-box">
        <div class="reward-icon" id="reward-icon">🎉</div>
        <h2 id="reward-title" style="margin: 16px 0;">太棒了！</h2>
        <p id="reward-text"></p>
        <div id="reward-badges" style="margin: 12px 0;"></div>
        <button class="btn btn-primary btn-lg" onclick="closeReward()" style="margin-top: 16px;">
            继续加油 💪
        </button>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
// ==================== 番茄钟状态 ====================
let durationMin = 25;
let remainingSec = 25 * 60;
let totalSec = 25 * 60;
let timerInterval = null;
let isRunning = false;
let isPaused = false;

// ==================== UI 控制 ====================

function setDuration(min, btn) {
    if (isRunning) return;
    durationMin = min;
    remainingSec = min * 60;
    totalSec = min * 60;
    updateDisplay();
    drawTimerRing(1);

    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function updateDisplay() {
    const min = Math.floor(remainingSec / 60);
    const sec = remainingSec % 60;
    document.getElementById('timer-minutes').textContent = min;
    document.getElementById('timer-seconds').textContent = ':' + String(sec).padStart(2, '0');
}

function drawTimerRing(progress) {
    const canvas = document.getElementById('timer-canvas');
    const ctx = canvas.getContext('2d');
    const cx = 140, cy = 140, r = 120, lineW = 10;

    ctx.clearRect(0, 0, 280, 280);

    // 背景圆环
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = '#E0E5EC';
    ctx.lineWidth = lineW;
    ctx.stroke();

    // 进度圆环
    if (progress > 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress);
        ctx.strokeStyle = progress > 0.5 ? '#5CB85C' : progress > 0.2 ? '#F5A623' : '#D9534F';
        ctx.lineWidth = lineW;
        ctx.lineCap = 'round';
        ctx.stroke();
    }
}

// ==================== 计时逻辑 ====================

function startTimer() {
    if (isRunning && !isPaused) return;

    if (!isPaused) {
        remainingSec = durationMin * 60;
        totalSec = remainingSec;
    }

    isRunning = true;
    isPaused = false;
    document.getElementById('timer-status').textContent = '专注中...';
    document.getElementById('btn-start').classList.add('hidden');
    document.getElementById('btn-pause').classList.remove('hidden');
    document.getElementById('btn-reset').classList.remove('hidden');

    // 禁用时长切换
    document.querySelectorAll('.duration-btn').forEach(b => b.style.pointerEvents = 'none');

    timerInterval = setInterval(() => {
        remainingSec--;
        updateDisplay();

        const progress = remainingSec / totalSec;
        drawTimerRing(progress);

        if (remainingSec <= 0) {
            completePomodoro();
        }
    }, 1000);
}

function pauseTimer() {
    if (!isRunning) return;
    clearInterval(timerInterval);
    isPaused = true;
    document.getElementById('timer-status').textContent = '已暂停';
    document.getElementById('btn-start').classList.remove('hidden');
    document.getElementById('btn-pause').classList.add('hidden');
    document.getElementById('btn-start').textContent = '▶ 继续';
}

function resetTimer() {
    clearInterval(timerInterval);
    isRunning = false;
    isPaused = false;
    remainingSec = durationMin * 60;
    totalSec = remainingSec;
    updateDisplay();
    drawTimerRing(1);
    document.getElementById('timer-status').textContent = '准备开始';
    document.getElementById('btn-start').classList.remove('hidden');
    document.getElementById('btn-start').textContent = '▶ 开始专注';
    document.getElementById('btn-pause').classList.add('hidden');
    document.getElementById('btn-reset').classList.add('hidden');

    // 恢复时长切换
    document.querySelectorAll('.duration-btn').forEach(b => b.style.pointerEvents = 'auto');
}

async function completePomodoro() {
    clearInterval(timerInterval);
    isRunning = false;
    isPaused = false;

    document.getElementById('timer-status').textContent = '✅ 完成！';
    updateDisplay();
    drawTimerRing(0);

    try {
        const result = await api.completePomodoro(durationMin);
        showReward(result);
    } catch (err) {
        console.error('完成番茄钟失败:', err);
        utils.toast('番茄钟已完成，但保存失败，请检查网络', 'error');
        resetTimer();
    }

    // 恢复时长切换
    document.querySelectorAll('.duration-btn').forEach(b => b.style.pointerEvents = 'auto');
    document.getElementById('btn-start').classList.remove('hidden');
    document.getElementById('btn-start').textContent = '▶ 再来一个';
    document.getElementById('btn-pause').classList.add('hidden');
    document.getElementById('btn-reset').classList.add('hidden');

    // 刷新统计
    loadStats();
    loadRecentSessions();
}

// ==================== 完成弹窗 ====================

function showReward(result) {
    const modal = document.getElementById('reward-modal');
    const titleEl = document.getElementById('reward-title');
    const textEl = document.getElementById('reward-text');
    const badgesEl = document.getElementById('reward-badges');
    const iconEl = document.getElementById('reward-icon');

    // 基础信息
    titleEl.textContent = result.level_up ? '🎉 升级了！' : '🍅 番茄钟完成！';
    iconEl.textContent = result.level_up ? '🎉' : '🍅';
    textEl.innerHTML = `
        获得 <strong>+${result.exp_gained}</strong> 经验值<br>
        当前等级：<strong>Lv.${result.new_level}</strong>
    `;

    // 新成就
    if (result.new_achievements && result.new_achievements.length > 0) {
        badgesEl.innerHTML = '<p style="margin-bottom:8px;">🏆 解锁新成就：</p>' +
            result.new_achievements.map(a =>
                `<span class="new-badge">${a.icon} ${a.name}</span>`
            ).join('');
    } else {
        badgesEl.innerHTML = '';
    }

    modal.classList.remove('hidden');
}

function closeReward() {
    document.getElementById('reward-modal').classList.add('hidden');
    resetTimer();
}

// ==================== 数据加载 ====================

async function loadStats() {
    try {
        const stats = await api.getPomodoroStats();
        document.getElementById('today-count').textContent = stats.today_sessions;
        document.getElementById('streak-days').textContent = stats.streak_days;
    } catch (e) {
        console.error('加载统计失败:', e);
    }
}

async function loadRecentSessions() {
    try {
        const data = await api.getPomodoroHistory(1, 5);
        const container = document.getElementById('recent-sessions');
        if (!data.sessions || data.sessions.length === 0) {
            container.innerHTML = '<p class="text-muted">还没有番茄钟记录，开始你的第一个吧！</p>';
            return;
        }
        container.innerHTML = data.sessions.map(s => `
            <div style="display: flex; justify-content: space-between; align-items: center;
                        padding: 10px 0; border-bottom: 1px solid var(--border);">
                <span>🍅 ${s.duration_min} 分钟专注</span>
                <span style="color: var(--text-secondary); font-size: 0.85rem;">
                    +${s.exp_gained} exp · ${utils.timeAgo(s.completed_at)}
                </span>
            </div>
        `).join('');
    } catch (e) {
        console.error('加载历史失败:', e);
    }
}

// ==================== 初始化 ====================

async function init() {
    if (!auth.requireLogin()) return;
    await auth.renderNavbar();
    drawTimerRing(1);
    updateDisplay();
    await loadStats();
    await loadRecentSessions();
}

document.addEventListener('DOMContentLoaded', init);

// 页面离开前提醒
window.addEventListener('beforeunload', (e) => {
    if (isRunning) {
        e.preventDefault();
        e.returnValue = '番茄钟还在运行中，确定离开吗？';
        return e.returnValue;
    }
});
</script>

</body>
</html>
