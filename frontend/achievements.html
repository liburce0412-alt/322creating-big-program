<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>成就殿堂 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        @media (min-width: 480px) {
            .badge-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px;
            }
        }

        .badge-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 10px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .badge-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .badge-card.locked {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .badge-card.locked:hover {
            filter: grayscale(80%);
            opacity: 0.7;
        }

        .badge-card .badge-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 8px;
        }

        @media (min-width: 480px) {
            .badge-card .badge-icon { font-size: 3.5rem; }
        }

        .badge-card .badge-name {
            font-weight: 700;
            font-size: var(--fs-sm);
            margin-bottom: 4px;
        }

        .badge-card .badge-desc {
            font-size: var(--fs-xs);
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .badge-card .badge-unlock-date {
            font-size: 0.7rem;
            color: var(--success);
            margin-top: 6px;
            font-weight: 600;
        }

        .badge-card .lock-overlay {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 1.1rem;
        }

        /* 等级进度卡片 */
        .level-progress-card {
            background: linear-gradient(135deg, var(--primary), #6C63FF);
            color: #fff;
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        @media (min-width: 600px) {
            .level-progress-card { padding: 32px; }
        }

        .level-progress-card .big-level {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            line-height: 1;
        }

        .level-progress-card .progress-bar {
            background: rgba(255,255,255,0.3);
            margin: 14px auto;
            max-width: 400px;
            height: 14px;
            border-radius: 7px;
        }

        .level-progress-card .progress-fill {
            background: linear-gradient(90deg, #FFD700, #FFA500);
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        @media (min-width: 480px) {
            .stats-row { gap: 32px; }
        }

        .stats-row .stat-item {
            text-align: center;
            min-width: 60px;
        }

        .stats-row .stat-num {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            font-weight: 800;
        }

        .stats-row .stat-lbl {
            font-size: var(--fs-xs);
            opacity: 0.85;
        }
    </style>
</head>
<body>

<nav id="navbar"></nav>

<div class="page-container">
    <div class="page-header text-center">
        <h1>🏆 成就殿堂</h1>
        <p>每一次专注，都是通往大师的一步</p>
    </div>

    <!-- 等级进度 -->
    <div class="level-progress-card" id="level-card">
        <div style="font-size: 0.9rem; opacity: 0.85;">当前等级</div>
        <div class="big-level" id="big-level">Lv.1</div>
        <div class="progress-bar" style="height: 16px; border-radius: 8px;">
            <div class="progress-fill" id="big-exp-bar" style="width: 0%;"></div>
        </div>
        <div id="big-exp-text" style="font-size: 0.9rem;">0 / 200 EXP</div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" id="stat-pomos">0</div>
                <div class="stat-lbl">🍅 番茄钟</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-records">0</div>
                <div class="stat-lbl">📝 时间记录</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-unlocked">0</div>
                <div class="stat-lbl">🏆 已解锁</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-streak">0</div>
                <div class="stat-lbl">🔥 连续天数</div>
            </div>
        </div>
    </div>

    <!-- 勋章列表 -->
    <div class="card">
        <div class="card-header">🎖️ 全部勋章</div>
        <div class="badge-grid" id="badge-grid">
            <p class="text-muted">加载中...</p>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
async function init() {
    if (!auth.requireLogin()) return;
    await auth.renderNavbar();

    try {
        var results = await Promise.all([
            api.getProfile(),
            api.getAllAchievements()
        ]);

        var profile = results[0];
        var badgesData = results[1];

        renderLevelCard(profile);
        renderBadges(badgesData.badges);
    } catch (err) {
        console.error('加载成就页失败:', err);
        utils.toast('加载数据失败', 'error');
    }
}

function renderLevelCard(profile) {
    document.getElementById('big-level').textContent = 'Lv.' + profile.level;
    document.getElementById('big-exp-bar').style.width = Math.min(profile.exp_percent, 100) + '%';
    document.getElementById('big-exp-text').textContent =
        profile.exp + ' / ' + profile.exp_needed + ' EXP';
    document.getElementById('stat-pomos').textContent = profile.total_pomodoros || 0;
    document.getElementById('stat-records').textContent = profile.total_records || 0;
    document.getElementById('stat-unlocked').textContent = profile.total_achievements || 0;
    document.getElementById('stat-streak').textContent = profile.streak_days || 0;
}

function renderBadges(badges) {
    var grid = document.getElementById('badge-grid');
    if (!badges || badges.length === 0) {
        grid.innerHTML = '<p class="text-muted">暂无勋章定义</p>';
        return;
    }

    grid.innerHTML = badges.map(function(b) {
        return '<div class="badge-card' + (b.unlocked ? '' : ' locked') + '">' +
            (b.unlocked ? '' : '<span class="lock-overlay">🔒</span>') +
            '<span class="badge-icon">' + b.icon + '</span>' +
            '<div class="badge-name">' + b.name + '</div>' +
            '<div class="badge-desc">' + b.description + '</div>' +
            (b.unlocked
                ? '<div class="badge-unlock-date">✅ ' + utils.formatDate(b.unlocked_at) + '</div>'
                : '<div style="font-size:0.7rem;color:#999;margin-top:4px;">未解锁</div>'
            ) +
        '</div>';
    }).join('');
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
