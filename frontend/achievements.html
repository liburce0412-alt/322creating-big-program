<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就殿堂 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }

        .badge-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 12px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .badge-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .badge-card.locked {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .badge-card.locked:hover {
            filter: grayscale(80%);
            opacity: 0.7;
        }

        .badge-card .badge-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .badge-card .badge-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .badge-card .badge-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .badge-card .badge-unlock-date {
            font-size: 0.7rem;
            color: var(--success);
            margin-top: 6px;
            font-weight: 600;
        }

        .badge-card .lock-overlay {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1.2rem;
        }

        .level-progress-card {
            background: linear-gradient(135deg, var(--primary), #6C63FF);
            color: #fff;
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 24px;
            text-align: center;
        }

        .level-progress-card .big-level {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1;
        }

        .level-progress-card .progress-bar {
            background: rgba(255,255,255,0.3);
            margin: 16px auto;
            max-width: 400px;
        }

        .level-progress-card .progress-fill {
            background: linear-gradient(90deg, #FFD700, #FFA500);
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stats-row .stat-item {
            text-align: center;
        }

        .stats-row .stat-num {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .stats-row .stat-lbl {
            font-size: 0.8rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>

<nav id="navbar"></nav>

<div class="page-container">
    <div class="page-header text-center">
        <h1>🏆 成就殿堂</h1>
        <p>每一次专注，都是通往大师的一步</p>
    </div>

    <!-- 等级进度 -->
    <div class="level-progress-card" id="level-card">
        <div style="font-size: 0.9rem; opacity: 0.85;">当前等级</div>
        <div class="big-level" id="big-level">Lv.1</div>
        <div class="progress-bar" style="height: 16px; border-radius: 8px;">
            <div class="progress-fill" id="big-exp-bar" style="width: 0%;"></div>
        </div>
        <div id="big-exp-text" style="font-size: 0.9rem;">0 / 200 EXP</div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-num" id="stat-pomos">0</div>
                <div class="stat-lbl">🍅 番茄钟</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-records">0</div>
                <div class="stat-lbl">📝 时间记录</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-unlocked">0</div>
                <div class="stat-lbl">🏆 已解锁</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-streak">0</div>
                <div class="stat-lbl">🔥 连续天数</div>
            </div>
        </div>
    </div>

    <!-- 勋章列表 -->
    <div class="card">
        <div class="card-header">🎖️ 全部勋章</div>
        <div class="badge-grid" id="badge-grid">
            <p class="text-muted">加载中...</p>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
async function init() {
    if (!auth.requireLogin()) return;
    await auth.renderNavbar();

    try {
        // 并行加载
        const [profile, badgesData] = await Promise.all([
            api.getProfile(),
            api.getAllAchievements()
        ]);

        renderLevelCard(profile);
        renderBadges(badgesData.badges);
    } catch (err) {
        console.error('加载成就页失败:', err);
        utils.toast('加载数据失败', 'error');
    }
}

function renderLevelCard(profile) {
    document.getElementById('big-level').textContent = `Lv.${profile.level}`;
    document.getElementById('big-exp-bar').style.width = `${Math.min(profile.exp_percent, 100)}%`;
    document.getElementById('big-exp-text').textContent =
        `${profile.exp} / ${profile.exp_needed} EXP`;
    document.getElementById('stat-pomos').textContent = profile.total_pomodoros;
    document.getElementById('stat-records').textContent = profile.total_records;
    document.getElementById('stat-unlocked').textContent = profile.total_achievements;
    document.getElementById('stat-streak').textContent = profile.streak_days;
}

function renderBadges(badges) {
    const grid = document.getElementById('badge-grid');
    if (!badges || badges.length === 0) {
        grid.innerHTML = '<p class="text-muted">暂无勋章定义</p>';
        return;
    }

    grid.innerHTML = badges.map(b => `
        <div class="badge-card ${b.unlocked ? '' : 'locked'}">
            ${b.unlocked ? '' : '<span class="lock-overlay">🔒</span>'}
            <span class="badge-icon">${b.icon}</span>
            <div class="badge-name">${b.name}</div>
            <div class="badge-desc">${b.description}</div>
            ${b.unlocked
                ? `<div class="badge-unlock-date">✅ ${utils.formatDate(b.unlocked_at)}</div>`
                : '<div style="font-size:0.7rem;color:#999;margin-top:4px;">未解锁</div>'
            }
        </div>
    `).join('');
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
