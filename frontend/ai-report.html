<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI 分析报告 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ai-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .ai-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .model-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 380px) {
            .model-grid {
                grid-template-columns: 1fr;
            }
        }

        .model-card {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            text-align: center;
            transition: all var(--transition);
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .model-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .model-card.selected {
            border-color: var(--primary);
            background: rgba(74, 144, 217, 0.05);
        }

        .model-card .model-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 4px;
        }

        .model-card .model-name {
            font-weight: 700;
            font-size: var(--fs-sm);
        }

        .model-card .model-desc {
            font-size: var(--fs-xs);
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .model-card .unavailable-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--danger);
            color: #fff;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.65rem;
        }

        .report-content {
            background: #FAFBFC;
            border-radius: var(--radius);
            padding: 20px;
            line-height: 1.8;
            font-size: var(--fs-sm);
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (min-width: 768px) {
            .report-content {
                max-height: 600px;
            }
        }

        .report-content h2 {
            color: var(--primary);
            margin: 16px 0 8px;
            font-size: 1.1rem;
        }

        .report-content h3 {
            color: var(--text);
            margin: 12px 0 6px;
        }

        .report-content strong {
            color: var(--accent);
        }

        .report-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* 聊天区域 */
        .chat-box {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            max-height: 300px;
            overflow-y: auto;
            background: #FAFBFC;
            margin-bottom: 10px;
        }

        @media (min-width: 768px) {
            .chat-box {
                max-height: 400px;
            }
        }

        .chat-msg {
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
        }

        .chat-msg.user {
            justify-content: flex-end;
        }

        .chat-msg .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: var(--fs-sm);
            line-height: 1.5;
            word-break: break-word;
        }

        .chat-msg.assistant .bubble {
            background: #E8F0FE;
            border-bottom-left-radius: 4px;
        }

        .chat-msg.user .bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input-row input {
            flex: 1;
            min-width: 0;
        }

        .chat-input-row .btn {
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<nav id="navbar"></nav>

<div class="page-container">
    <div class="page-header text-center">
        <h1>🤖 AI 智能分析</h1>
        <p>选择 AI 模型，一键生成你的时间管理分析报告</p>
    </div>

    <div class="ai-layout">
        <!-- 左侧：模型选择 + 历史报告 + 对话 -->
        <div>
            <!-- 模型选择 -->
            <div class="card">
                <div class="card-header">🧠 选择 AI 模型</div>
                <div id="model-list" class="model-grid">
                    <p class="text-muted">加载中...</p>
                </div>
                <div class="text-center mt-2">
                    <button class="btn btn-primary btn-lg btn-responsive" id="btn-generate" onclick="generateReport()">
                        ✨ 生成分析报告
                    </button>
                </div>
                <div id="generate-status" class="text-center mt-1" style="font-size: var(--fs-sm);"></div>
            </div>

            <!-- 历史报告列表 -->
            <div class="card">
                <div class="card-header">📋 历史报告</div>
                <div id="reports-list">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>

            <!-- AI 对话 -->
            <div class="card">
                <div class="card-header">💬 AI 对话助手</div>
                <div class="chat-box" id="chat-box">
                    <div class="chat-msg assistant">
                        <div class="bubble">你好！我是校园达人 AI 助手，有什么关于时间管理的问题可以问我 😊</div>
                    </div>
                </div>
                <div class="chat-input-row">
                    <input type="text" class="form-input" id="chat-input"
                           placeholder="输入问题..."
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>

        <!-- 右侧：报告内容 -->
        <div>
            <div class="card">
                <div class="card-header">📄 分析报告</div>
                <div class="report-content" id="report-content">
                    <p class="text-muted text-center" style="padding: 40px 0;">
                        👈 选择模型，点击「生成分析报告」<br>
                        AI 将根据你的时间数据生成个性化报告
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
var selectedModel = 'mock';

// ==================== 初始化 ====================

async function init() {
    if (!auth.requireLogin()) return;
    await auth.renderNavbar();
    await loadModels();
    await loadReports();
}

async function loadModels() {
    try {
        var data = await api.getAiModels();
        var container = document.getElementById('model-list');
        container.innerHTML = data.models.map(function(m) {
            return '<div class="model-card' + (m.id === selectedModel ? ' selected' : '') + '"' +
                 ' onclick="selectModel(\'' + m.id + '\', this)"' +
                 ' id="model-' + m.id + '">' +
                (m.available === false && m.id !== 'mock' ? '<span class="unavailable-badge">未配置</span>' : '') +
                '<span class="model-icon">' + m.icon + '</span>' +
                '<div class="model-name">' + m.name + '</div>' +
                '<div class="model-desc">' + m.description + '</div>' +
            '</div>';
        }).join('');
    } catch (e) {
        console.error('加载模型列表失败:', e);
    }
}

function selectModel(id, el) {
    selectedModel = id;
    document.querySelectorAll('.model-card').forEach(function(c) { c.classList.remove('selected'); });
    el.classList.add('selected');
}

// ==================== 生成报告 ====================

async function generateReport() {
    var btn = document.getElementById('btn-generate');
    var status = document.getElementById('generate-status');
    var reportEl = document.getElementById('report-content');

    btn.disabled = true;
    btn.textContent = '⏳ 正在生成...';
    reportEl.innerHTML = '<div class="text-center" style="padding:40px;">' +
        '<span class="spinner spinner-lg"></span>' +
        '<p class="mt-2">AI 正在分析你的数据...</p></div>';
    status.innerHTML = '';

    try {
        var data = await api.generateReport(selectedModel);
        reportEl.innerHTML = data.content;

        if (data.new_achievements && data.new_achievements.length > 0) {
            data.new_achievements.forEach(function(a) {
                utils.toast('🏆 解锁成就：' + a.name, 'success');
            });
        }

        status.innerHTML = '<span class="text-success">✅ 报告生成成功 (' + data.model + ')</span>';
        await loadReports();
    } catch (err) {
        console.error('生成报告失败:', err);
        reportEl.innerHTML = '<p class="text-danger text-center">生成失败：' + err.message + '</p>';
        status.innerHTML = '<span class="text-danger">❌ 生成失败，请重试</span>';
    } finally {
        btn.disabled = false;
        btn.textContent = '✨ 生成分析报告';
    }
}

async function loadReports() {
    try {
        var data = await api.getReports();
        var container = document.getElementById('reports-list');
        if (!data.reports || data.reports.length === 0) {
            container.innerHTML = '<p class="text-muted">还没有报告</p>';
            return;
        }
        container.innerHTML = data.reports.map(function(r) {
            return '<div style="padding: 10px 0; border-bottom: 1px solid var(--border);' +
                        'cursor: pointer; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;"' +
                 ' onclick="loadReportDetail(' + r.id + ')" title="点击查看详情">' +
                '<span>🤖 ' + r.model + '</span>' +
                '<span style="font-size:0.8rem; color: var(--text-secondary);">' + (r.preview || '') + '</span>' +
                '<span style="font-size:0.75rem; color:#999;">' + utils.timeAgo(r.created_at) + '</span>' +
            '</div>';
        }).join('');
    } catch (e) {
        console.error('加载报告列表失败:', e);
    }
}

async function loadReportDetail(id) {
    try {
        var data = await api.getReportDetail(id);
        document.getElementById('report-content').innerHTML = data.report_content;
        utils.toast('已加载历史报告', 'info');
    } catch (e) {
        utils.toast('加载报告失败', 'error');
    }
}

// ==================== AI 对话 ====================

async function sendMessage() {
    var input = document.getElementById('chat-input');
    var message = input.value.trim();
    if (!message) return;

    input.value = '';
    var chatBox = document.getElementById('chat-box');

    // 添加用户消息
    chatBox.innerHTML +=
        '<div class="chat-msg user">' +
            '<div class="bubble">' + escapeHtml(message) + '</div>' +
        '</div>';

    // 加载指示
    var loadingId = 'loading-' + Date.now();
    chatBox.innerHTML +=
        '<div class="chat-msg assistant" id="' + loadingId + '">' +
            '<div class="bubble"><span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> 思考中...</div>' +
        '</div>';
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        var data = await api.sendChatMessage(message);
        var loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
        chatBox.innerHTML +=
            '<div class="chat-msg assistant">' +
                '<div class="bubble">' + escapeHtml(data.reply) + '</div>' +
            '</div>';
        chatBox.scrollTop = chatBox.scrollHeight;
    } catch (err) {
        var loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
        chatBox.innerHTML +=
            '<div class="chat-msg assistant">' +
                '<div class="bubble" style="color:var(--danger);">抱歉，回复失败：' + escapeHtml(err.message) + '</div>' +
            '</div>';
    }
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
