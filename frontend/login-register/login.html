<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园达人 · 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="logo">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="12" fill="url(#lg)"/>
                        <path d="M12 14a2 2 0 012-2h8l4 4v12a2 2 0 01-2 2H14a2 2 0 01-2-2V14z" fill="#fff" opacity=".95"/>
                        <path d="M22 12v4h4" fill="#fff" opacity=".6"/>
                        <defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                    </svg>
                </div>
                <h1>校园达人</h1>
                <p>欢迎回来，继续你的专注之旅</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " required>
                    <label for="username">用户名</label>
                </div>
                <div class="error-msg" id="usernameError"><i class="fas fa-exclamation-circle"></i> 请输入用户名</div>

                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">密码</label>
                    <button type="button" class="toggle-password" id="togglePwd" tabindex="-1">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                <div class="error-msg" id="passwordError"><i class="fas fa-exclamation-circle"></i> 请输入密码</div>

                <button type="submit" class="btn" id="loginBtn">
                    <span class="btn-text">登 录</span>
                    <div class="loader"></div>
                </button>
            </form>

            <div class="toggle-link">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        const form = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const togglePwd = document.getElementById('togglePwd');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');

        togglePwd.addEventListener('click', () => {
            const icon = togglePwd.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                password.type = 'password';
                icon.className = 'far fa-eye';
            }
        });

        function hideErrors() {
            usernameError.style.display = 'none';
            passwordError.style.display = 'none';
            alertBox.style.display = 'none';
        }

        function showAlert(message, type = 'error') {
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'flex';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideErrors();

            const userVal = username.value.trim();
            const passVal = password.value;
            let valid = true;

            if (!userVal) {
                usernameError.style.display = 'flex';
                valid = false;
            }
            if (!passVal) {
                passwordError.style.display = 'flex';
                valid = false;
            }
            if (!valid) return;

            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userVal, password: passVal })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                    showAlert('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } else {
                    showAlert(data.message || '用户名或密码错误');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            } catch (error) {
                showAlert('网络连接失败，请稍后重试');
                console.error(error);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
