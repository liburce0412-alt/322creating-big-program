<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>注册 - 校园达人 CampusAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <div class="logo">🎓</div>
        <h1>创建账号</h1>
        <p class="subtitle">加入校园达人，开启时间管理之旅</p>

        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" class="form-input" id="username" placeholder="2-32个字符" required autofocus
                       minlength="2" maxlength="32">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" class="form-input" id="password" placeholder="至少6位密码" required
                       minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" class="form-input" id="password2" placeholder="再次输入密码" required>
            </div>
            <div class="error-msg" id="error-msg"></div>
            <button type="submit" class="btn btn-success btn-lg" id="btn-submit">
                注 册
            </button>
        </form>

        <p class="auth-switch">
            已有账号？<a href="login.html">立即登录 →</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script>
if (auth.isLoggedIn()) {
    window.location.href = 'dashboard.html';
}

async function handleRegister(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errorEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-submit');

    hideError();

    if (username.length < 2) {
        showError('用户名至少需要 2 个字符');
        return;
    }
    if (password.length < 6) {
        showError('密码至少需要 6 位');
        return;
    }
    if (password !== password2) {
        showError('两次输入的密码不一致');
        return;
    }

    btn.disabled = true;
    btn.textContent = '注册中...';

    try {
        await auth.register(username, password);
        utils.toast('注册成功！欢迎加入校园达人 🎉', 'success');
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 500);
    } catch (err) {
        showError(err.message || '注册失败，请重试');
        btn.disabled = false;
        btn.textContent = '注 册';
    }
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideError() {
    document.getElementById('error-msg').style.display = 'none';
}
</script>

</body>
</html>
