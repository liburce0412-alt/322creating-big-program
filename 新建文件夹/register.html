<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园达人 · 注册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="logo">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="12" fill="url(#lg)"/>
                        <path d="M20 10a10 10 0 110 20 10 10 0 010-20zm0 6v4m0 4h.01" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                        <defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
                    </svg>
                </div>
                <h1>创建账号</h1>
                <p>加入校园达人，开启高效学习</p>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="registerForm" autocomplete="off">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " required minlength="3" maxlength="20">
                    <label for="username">用户名</label>
                </div>
                <div class="error-msg" id="usernameError"><i class="fas fa-exclamation-circle"></i> 3-20位字母或数字</div>

                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required minlength="6">
                    <label for="password">密码</label>
                    <button type="button" class="toggle-password" id="togglePwd1" tabindex="-1">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                <div class="error-msg" id="passwordError"><i class="fas fa-exclamation-circle"></i> 至少6位密码</div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder=" " required>
                    <label for="confirmPassword">确认密码</label>
                    <button type="button" class="toggle-password" id="togglePwd2" tabindex="-1">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                <div class="error-msg" id="confirmError"><i class="fas fa-exclamation-circle"></i> 两次密码不一致</div>

                <button type="submit" class="btn" id="registerBtn">
                    <span class="btn-text">注 册</span>
                    <div class="loader"></div>
                </button>
            </form>

            <div class="toggle-link">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirmPassword');
        const registerBtn = document.getElementById('registerBtn');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');

        document.getElementById('togglePwd1').addEventListener('click', function() {
            const icon = this.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                password.type = 'password';
                icon.className = 'far fa-eye';
            }
        });
        document.getElementById('togglePwd2').addEventListener('click', function() {
            const icon = this.querySelector('i');
            if (confirm.type === 'password') {
                confirm.type = 'text';
                icon.className = 'far fa-eye-slash';
            } else {
                confirm.type = 'password';
                icon.className = 'far fa-eye';
            }
        });

        username.addEventListener('input', () => {
            const val = username.value;
            const regex = /^[a-zA-Z0-9]*$/;
            if (val && !regex.test(val)) {
                username.value = val.replace(/[^a-zA-Z0-9]/g, '');
            }
        });

        function hideErrors() {
            usernameError.style.display = 'none';
            passwordError.style.display = 'none';
            confirmError.style.display = 'none';
            alertBox.style.display = 'none';
        }

        function showAlert(message, type = 'error') {
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'flex';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideErrors();

            const userVal = username.value.trim();
            const passVal = password.value;
            const confirmVal = confirm.value;
            let valid = true;

            if (userVal.length < 3 || userVal.length > 20 || !/^[a-zA-Z0-9]+$/.test(userVal)) {
                usernameError.style.display = 'flex';
                valid = false;
            }
            if (passVal.length < 6) {
                passwordError.style.display = 'flex';
                valid = false;
            }
            if (passVal !== confirmVal) {
                confirmError.style.display = 'flex';
                valid = false;
            }
            if (!valid) return;

            registerBtn.classList.add('loading');
            registerBtn.disabled = true;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userVal, password: passVal })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('注册成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);
                } else {
                    showAlert(data.message || '注册失败，请稍后重试');
                    registerBtn.classList.remove('loading');
                    registerBtn.disabled = false;
                }
            } catch (error) {
                showAlert('网络连接失败');
                console.error(error);
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
